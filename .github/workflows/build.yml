name: Build Klimate Overlay

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest  # Switch 빌드 환경 (Docker)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Switch portlibs
        # -y(DB sync) 생략: pkg.devkitpro.org DB 접근 없이 이미지 내 캐시 사용
        run: dkp-pacman -S --needed --noconfirm switch-curl switch-mbedtls switch-zlib

      - name: Download headers
        run: |
          curl -fsSL \
            https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp \
            -o include/json.hpp

          curl -fsSL \
            https://raw.githubusercontent.com/WerWolv/libtesla/master/include/tesla.hpp \
            -o include/tesla.hpp

          # 다운로드 실패 시 즉시 중단
          test -s include/json.hpp  || { echo "json.hpp 다운로드 실패"; exit 1; }
          test -s include/tesla.hpp || { echo "tesla.hpp 다운로드 실패"; exit 1; }

      - name: Build
        run: make
        env:
          DEVKITPRO: /opt/devkitpro

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: klimate-overlay
          path: weather_overlay.ovl
          if-no-files-found: error
